services:
  db:
    image: postgres:16-alpine
    container_name: support-system-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-support_system}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "${POSTGRES_BIND:-127.0.0.1}:${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-support_system}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: support-system-redis
    restart: unless-stopped
    ports:
      - "${REDIS_BIND:-127.0.0.1}:${REDIS_PORT:-6379}:6379"
    volumes:
      - redis-data:/data

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: support-system-api
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 4000
      WEB_APP_URL: ${WEB_APP_URL:-http://localhost:13000}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:13000}
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@db:5432/${POSTGRES_DB:-support_system}?schema=public
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:-local-dev-access-secret}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-local-dev-refresh-secret}
      PUBLIC_MACHINE_ACCESS_SECRET: ${PUBLIC_MACHINE_ACCESS_SECRET:-local-dev-machine-access-secret}
      WHATSAPP_PROVIDER: ${WHATSAPP_PROVIDER:-log}
      WHATSAPP_META_GRAPH_API_VERSION: ${WHATSAPP_META_GRAPH_API_VERSION:-v20.0}
      WHATSAPP_META_PHONE_NUMBER_ID: ${WHATSAPP_META_PHONE_NUMBER_ID:-}
      WHATSAPP_META_ACCESS_TOKEN: ${WHATSAPP_META_ACCESS_TOKEN:-}
      WHATSAPP_META_WEBHOOK_VERIFY_TOKEN: ${WHATSAPP_META_WEBHOOK_VERIFY_TOKEN:-}
      WHATSAPP_META_APP_SECRET: ${WHATSAPP_META_APP_SECRET:-}
      WHATSAPP_META_MESSAGE_MODE: ${WHATSAPP_META_MESSAGE_MODE:-text}
      WHATSAPP_META_TEMPLATE_LANGUAGE: ${WHATSAPP_META_TEMPLATE_LANGUAGE:-en}
      WHATSAPP_META_TEMPLATE_TICKET_CREATED_REQUESTER: ${WHATSAPP_META_TEMPLATE_TICKET_CREATED_REQUESTER:-}
      WHATSAPP_META_TEMPLATE_TICKET_CREATED_TECHNICIAN: ${WHATSAPP_META_TEMPLATE_TICKET_CREATED_TECHNICIAN:-}
      WHATSAPP_META_TEMPLATE_TICKET_STATUS_CHANGED: ${WHATSAPP_META_TEMPLATE_TICKET_STATUS_CHANGED:-}
      WHATSAPP_META_TEMPLATE_SERVICE_REPORT_SUBMITTED: ${WHATSAPP_META_TEMPLATE_SERVICE_REPORT_SUBMITTED:-}
      WHATSAPP_META_TEMPLATE_MACHINE_LOG_CREATED: ${WHATSAPP_META_TEMPLATE_MACHINE_LOG_CREATED:-}
      WHATSAPP_META_TEMPLATE_SCHEDULED_TASK_CREATED: ${WHATSAPP_META_TEMPLATE_SCHEDULED_TASK_CREATED:-}
      WHATSAPP_META_TEMPLATE_SCHEDULED_TASK_RESCHEDULED: ${WHATSAPP_META_TEMPLATE_SCHEDULED_TASK_RESCHEDULED:-}
      TWILIO_ACCOUNT_SID: ${TWILIO_ACCOUNT_SID:-}
      TWILIO_AUTH_TOKEN: ${TWILIO_AUTH_TOKEN:-}
      TWILIO_WHATSAPP_FROM: ${TWILIO_WHATSAPP_FROM:-}
      TWILIO_WHATSAPP_STATUS_CALLBACK_URL: ${TWILIO_WHATSAPP_STATUS_CALLBACK_URL:-}
      TWILIO_MESSAGE_MODE: ${TWILIO_MESSAGE_MODE:-body}
      TWILIO_CONTENT_SID_TICKET_CREATED_REQUESTER: ${TWILIO_CONTENT_SID_TICKET_CREATED_REQUESTER:-}
      TWILIO_CONTENT_SID_TICKET_CREATED_TECHNICIAN: ${TWILIO_CONTENT_SID_TICKET_CREATED_TECHNICIAN:-}
      TWILIO_CONTENT_SID_TICKET_STATUS_CHANGED: ${TWILIO_CONTENT_SID_TICKET_STATUS_CHANGED:-}
      TWILIO_CONTENT_SID_SERVICE_REPORT_SUBMITTED: ${TWILIO_CONTENT_SID_SERVICE_REPORT_SUBMITTED:-}
      TWILIO_CONTENT_SID_SCHEDULED_TASK_CREATED: ${TWILIO_CONTENT_SID_SCHEDULED_TASK_CREATED:-}
      TWILIO_CONTENT_SID_SCHEDULED_TASK_RESCHEDULED: ${TWILIO_CONTENT_SID_SCHEDULED_TASK_RESCHEDULED:-}
    ports:
      - "${API_BIND:-127.0.0.1}:${API_PORT:-14000}:4000"
    volumes:
      - ./data/uploads:/app/uploads
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:14000}
    container_name: support-system-web
    restart: unless-stopped
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:14000}
    ports:
      - "${WEB_BIND:-127.0.0.1}:${WEB_PORT:-13000}:3000"
    depends_on:
      api:
        condition: service_started

volumes:
  postgres-data:
  redis-data:
